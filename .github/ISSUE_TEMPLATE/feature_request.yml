name: Feature Request
description: Suggest an improvement or new feature
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea that would improve CV Hub for everyone? Let's hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "It's annoying that there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Would be great to have a field in YAML for..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "I tried doing X but..."
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: Is this useful for most people who fork CV Hub?
      options:
        - label: Yes, this is a general improvement, not just personal