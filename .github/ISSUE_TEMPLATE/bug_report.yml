name: Bug Report
description: Something is broken or not working as expected
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: "When I run npm run dev, the showcase page throws an error..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Clone the repo
        2. Run npm run dev
        3. Open /showcase
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: The page should render correctly.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 20, macOS 14, Astro 4.x"
    validations:
      required: false